<!doctype html>
<html><head><meta charset="utf-8"><title>Navigation</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; justify-content: flex-start; }
  .topbar { background: var(--tm-black); color: #fff; padding: 6px 28px; display: flex; justify-content: space-between; align-items: center; }
  .topbar .item { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; color: #ddd; }
  .topbar .dot { width: 5px; height: 5px; background: var(--tm-red); border-radius: 999px; animation: blink 1.4s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
  .logo-row { display: flex; justify-content: center; padding: 18px 28px 10px; }
  .logo-row img { height: 40px; width: 40px; display: block; }
  .nav { display: flex; justify-content: center; align-items: center; padding: 8px 28px 16px; border-bottom: 1px solid var(--line); }
  .links { display: flex; gap: 36px; }
  .links a { font-family: var(--font-body); font-weight: 600; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; position: relative; color: var(--tm-black); }
  .links a::after { content: ""; position: absolute; left: 0; right: 0; bottom: -4px; height: 1px; background: var(--tm-red); transform: scaleX(0); transform-origin: left; transition: transform 240ms cubic-bezier(0.22,1,0.36,1); }
  .links a:hover::after, .links a.active::after { transform: scaleX(1); }
  .links a.active { color: var(--tm-red); }
  .footer { padding: 12px 28px; display: flex; justify-content: space-between; align-items: center; }
  .meta { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-muted); font-weight: 600; }
</style>
</head><body>
<div class="topbar">
  <div class="item"><span class="dot"></span>Open · 9–5 · Mon–Fri</div>
  <div class="item">Lisbon · Berlin · GMT+1</div>
  <div class="item">hi@toymade.studio</div>
</div>
<div class="logo-row"><img src="../assets/toymade_logo_black.png" alt="tm"/></div>
<nav class="nav">
  <div class="links"><a class="active">Work</a><a>About</a><a>Lab</a><a>Journal</a><a>Contact</a></div>
</nav>
<div class="footer">
  <div class="meta">© 2025 Toymade Studio</div>
  <div class="meta">Made by hand</div>
</div>
</body></html>
