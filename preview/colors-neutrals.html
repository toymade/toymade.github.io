<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); height: 100%; }
  .sw { padding: 16px 12px; display: flex; flex-direction: column; justify-content: flex-end; gap: 4px; }
  .sw .lbl { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
  .sw .hex { font-size: 10px; letter-spacing: 0.08em; opacity: 0.65; }
  .s100 { background: #F2F2F2; color: #0A0A0A; }
  .s200 { background: #E5E5E5; color: #0A0A0A; }
  .s300 { background: #C7C7C7; color: #0A0A0A; }
  .s400 { background: #8A8A8A; color: #FFFFFF; }
  .s500 { background: #5C5C5C; color: #FFFFFF; }
  .s600 { background: #2E2E2E; color: #FFFFFF; }
  .s700 { background: #1A1A1A; color: #FFFFFF; }
</style>
</head><body>
<div class="grid">
  <div class="sw s100"><div class="lbl">Ink/100</div><div class="hex">#F2F2F2</div></div>
  <div class="sw s200"><div class="lbl">Ink/200</div><div class="hex">#E5E5E5</div></div>
  <div class="sw s300"><div class="lbl">Ink/300</div><div class="hex">#C7C7C7</div></div>
  <div class="sw s400"><div class="lbl">Ink/400</div><div class="hex">#8A8A8A</div></div>
  <div class="sw s500"><div class="lbl">Ink/500</div><div class="hex">#5C5C5C</div></div>
  <div class="sw s600"><div class="lbl">Ink/600</div><div class="hex">#2E2E2E</div></div>
  <div class="sw s700"><div class="lbl">Ink/700</div><div class="hex">#1A1A1A</div></div>
</div>
</body></html>
