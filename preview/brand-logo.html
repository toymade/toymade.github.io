<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 100%; }
  .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 16px; position: relative; }
  .cell img { width: 64px; height: 64px; }
  .lbl { font-family: var(--font-body); font-weight: 600; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: inherit; opacity: 0.6; }
  .light { background: #FAFAFA; color: #0A0A0A; border-right: 1px solid var(--line); }
  .dark { background: #0A0A0A; color: #fff; }
  .red { background: #E50914; color: #fff; border-left: 1px solid #E50914; }
</style>
</head><body>
<div class="grid">
  <div class="cell light"><img src="../assets/toymade_logo_black.png"/><div class="lbl">on light</div></div>
  <div class="cell dark"><img src="../assets/toymade_logo_white.png"/><div class="lbl">on dark</div></div>
  <div class="cell red"><img src="../assets/toymade_logo_white.png"/><div class="lbl">on red</div></div>
</div>
</body></html>
