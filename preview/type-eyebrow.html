<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow & Meta</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; gap: 24px; justify-content: center; }
  .eb { font-family: var(--font-body); font-weight: 500; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 10px; }
  .eb::before { content: ""; width: 28px; height: 1px; background: currentColor; }
  .red { color: var(--tm-red); }
  .meta-row { display: flex; gap: 32px; }
  .num { font-family: var(--font-display); font-weight: 900; font-size: 60px; line-height: 0.8; letter-spacing: -0.04em; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .lbl { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-muted); }
</style>
</head><body>
<div><span class="eb">Selected Work · 2024</span></div>
<div><span class="eb red">→ New project · live</span></div>
<div class="meta-row">
  <div class="stack"><div class="lbl">Index</div><div class="num">001</div></div>
  <div class="stack"><div class="lbl">Index</div><div class="num">/ 24</div></div>
</div>
</body></html>
