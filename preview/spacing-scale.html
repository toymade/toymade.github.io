<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; gap: 8px; justify-content: center; }
  .row { display: grid; grid-template-columns: 56px 1fr 80px; align-items: center; gap: 16px; }
  .lbl { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .bar { background: var(--tm-red); height: 14px; }
  .px { font-size: 11px; color: var(--fg-muted); letter-spacing: 0.08em; text-align: right; }
</style>
</head><body>
<div class="row"><div class="lbl">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
<div class="row"><div class="lbl">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
<div class="row"><div class="lbl">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
<div class="row"><div class="lbl">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
<div class="row"><div class="lbl">sp-5</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
<div class="row"><div class="lbl">sp-6</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
<div class="row"><div class="lbl">sp-7</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
<div class="row"><div class="lbl">sp-8</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
<div class="row"><div class="lbl">sp-9</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
</body></html>
